app:
  auth:
    allow-legacy-plaintext-password: true

  datasource:
    platform:
      url: jdbc:mysql://${DATABASE_HOST:127.0.0.1}:3306/${PLATFORM_DATABASE_NAME:oms}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${DATABASE_USER:root}
      password: ${DATABASE_PASSWORD:}

spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
