spring:
  application:
    name: avnzor-oms

  profiles:
    # Local development defaults to dev; servers set SPRING_PROFILES_ACTIVE=staging|prod.
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Schema is managed by Flyway; Hibernate only validates entity mappings at startup.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: Existing production schema before Flyway adoption
    validate-on-migrate: true
    validate-migration-naming: true
    clean-disabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.avnzor: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  jwt:
    # Dev-only defaults; staging and prod require JWT_SECRET and JWT_EXPIRATION env vars.
    secret: ${JWT_SECRET:change-me-use-at-least-32-characters-for-hs256}
    expiration-ms: ${JWT_EXPIRATION:86400000}

  # Runtime settings for external providers and integrations (override per environment via env vars).
  integrations:
    tracking-api-url: ${TRACKING_API_URL:}
    shipping-provider-url: ${SHIPPING_PROVIDER_URL:}
    shipping-provider-api-key: ${SHIPPING_PROVIDER_API_KEY:}
    notification-webhook-url: ${NOTIFICATION_WEBHOOK_URL:}
