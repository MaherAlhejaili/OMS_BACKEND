spring:
  application:
    name: avnzor-oms

  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  sql:
    init:
      mode: never

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.avnzor: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  auth:
    allow-legacy-plaintext-password: false

  datasource:
    platform:
      driver-class-name: com.mysql.cj.jdbc.Driver

  multi-tenancy:
    encryption-key: ${TENANT_DB_ENCRYPTION_KEY:local-dev-encryption-key-32chars-min}
    datasource-maximum-pool-size: ${TENANT_DS_MAX_POOL_SIZE:5}
    datasource-minimum-idle: ${TENANT_DS_MIN_IDLE:1}

  jwt:
    secret: ${JWT_SECRET:change-me-use-at-least-32-characters-for-hs256}
    expiration-ms: ${JWT_EXPIRATION:86400000}

  integrations:
    tracking-api-url: ${TRACKING_API_URL:}
    shipping-provider-url: ${SHIPPING_PROVIDER_URL:}
    shipping-provider-api-key: ${SHIPPING_PROVIDER_API_KEY:}
    notification-webhook-url: ${NOTIFICATION_WEBHOOK_URL:}
