spring:
  application:
    name: avnzor-oms

  profiles:
    # Local development defaults to the dev profile; override via SPRING_PROFILES_ACTIVE.
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Schema is managed by Flyway; Hibernate only validates entity mappings at startup.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Adopt Flyway on a database that already has tables without re-running historical DDL.
    baseline-on-migrate: true
    # Treat the current production schema as version 1; new scripts start at V2__.
    baseline-version: 1
    baseline-description: Existing production schema before Flyway adoption
    validate-on-migrate: true
    validate-migration-naming: true
    # Never allow flyway clean against shared or production databases.
    clean-disabled: true

server:
  port: 8080

logging:
  level:
    root: INFO
    com.avnzor: INFO
