spring:
  datasource:
    url: jdbc:mysql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}

server:
  port: ${SERVER_PORT}

logging:
  level:
    root: WARN
    com.avnzor: INFO

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
