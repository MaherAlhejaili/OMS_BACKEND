spring:
  datasource:
    # Isolated database for automated tests; defaults keep local/CI runs self-contained.
    url: jdbc:mysql://${DATABASE_HOST:127.0.0.1}:3306/${DATABASE_NAME:avnzor_test}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DATABASE_USER:root}
    password: ${DATABASE_PASSWORD:}

  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.avnzor: INFO
