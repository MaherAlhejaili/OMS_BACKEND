name: CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: avnzor_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run Maven verify
        run: ./mvnw clean verify
        env:
          SPRING_PROFILES_ACTIVE: test
          DATABASE_HOST: 127.0.0.1
          DATABASE_NAME: avnzor_test
          DATABASE_USER: root
          DATABASE_PASSWORD: root

      - name: Package application JAR
        run: ./mvnw package -DskipTests

      - name: Upload deployable artifact
        uses: actions/upload-artifact@v4
        with:
          name: oms-backend-jar
          path: target/*.jar
          retention-days: 30
          if-no-files-found: error

  deploy-staging:
    name: Deploy to staging
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Download application artifact
        uses: actions/download-artifact@v4
        with:
          name: oms-backend-jar
          path: artifact

      - name: Prepare JAR for deployment
        run: |
          JAR_FILE="$(find artifact -maxdepth 1 -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -1)"
          cp "${JAR_FILE}" oms-backend.jar

      - name: Copy files to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "oms-backend.jar,deploy/scripts/deploy.sh"
          target: "/tmp/avnzor-deploy"
          strip_components: 0

      - name: Deploy on staging server
        uses: appleboy/ssh-action@v1.2.0
        env:
          SPRING_PROFILES_ACTIVE: staging
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
          LOG_FILE_PATH: ${{ secrets.LOG_FILE_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SPRING_PROFILES_ACTIVE,SERVER_PORT,DATABASE_HOST,DATABASE_PORT,DATABASE_NAME,DATABASE_USER,DATABASE_PASSWORD,JWT_SECRET,JWT_EXPIRATION,LOG_FILE_PATH
          script: |
            set -euo pipefail
            sudo mkdir -p /opt/avnzor/config
            {
              echo "SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}"
              echo "SERVER_PORT=${SERVER_PORT}"
              echo "DATABASE_HOST=${DATABASE_HOST}"
              echo "DATABASE_PORT=${DATABASE_PORT}"
              echo "DATABASE_NAME=${DATABASE_NAME}"
              echo "DATABASE_USER=${DATABASE_USER}"
              echo "DATABASE_PASSWORD=${DATABASE_PASSWORD}"
              echo "JWT_SECRET=${JWT_SECRET}"
              echo "JWT_EXPIRATION=${JWT_EXPIRATION}"
              echo "LOG_FILE_PATH=${LOG_FILE_PATH}"
            } | sudo tee /opt/avnzor/config/application.env > /dev/null
            sudo chmod 600 /opt/avnzor/config/application.env
            sudo chown avnzor:avnzor /opt/avnzor/config/application.env
            sudo chmod +x /tmp/avnzor-deploy/deploy/scripts/deploy.sh
            sudo /tmp/avnzor-deploy/deploy/scripts/deploy.sh /tmp/avnzor-deploy/oms-backend.jar

  deploy-production:
    name: Deploy to production
    needs: deploy-staging
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download application artifact
        uses: actions/download-artifact@v4
        with:
          name: oms-backend-jar
          path: artifact

      - name: Prepare JAR for deployment
        run: |
          JAR_FILE="$(find artifact -maxdepth 1 -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | head -1)"
          cp "${JAR_FILE}" oms-backend.jar

      - name: Copy files to production server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "oms-backend.jar,deploy/scripts/deploy.sh"
          target: "/tmp/avnzor-deploy"
          strip_components: 0

      - name: Deploy on production server
        uses: appleboy/ssh-action@v1.2.0
        env:
          SPRING_PROFILES_ACTIVE: prod
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
          LOG_FILE_PATH: ${{ secrets.LOG_FILE_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SPRING_PROFILES_ACTIVE,SERVER_PORT,DATABASE_HOST,DATABASE_PORT,DATABASE_NAME,DATABASE_USER,DATABASE_PASSWORD,JWT_SECRET,JWT_EXPIRATION,LOG_FILE_PATH
          script: |
            set -euo pipefail
            sudo mkdir -p /opt/avnzor/config
            {
              echo "SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}"
              echo "SERVER_PORT=${SERVER_PORT}"
              echo "DATABASE_HOST=${DATABASE_HOST}"
              echo "DATABASE_PORT=${DATABASE_PORT}"
              echo "DATABASE_NAME=${DATABASE_NAME}"
              echo "DATABASE_USER=${DATABASE_USER}"
              echo "DATABASE_PASSWORD=${DATABASE_PASSWORD}"
              echo "JWT_SECRET=${JWT_SECRET}"
              echo "JWT_EXPIRATION=${JWT_EXPIRATION}"
              echo "LOG_FILE_PATH=${LOG_FILE_PATH}"
            } | sudo tee /opt/avnzor/config/application.env > /dev/null
            sudo chmod 600 /opt/avnzor/config/application.env
            sudo chown avnzor:avnzor /opt/avnzor/config/application.env
            sudo chmod +x /tmp/avnzor-deploy/deploy/scripts/deploy.sh
            sudo /tmp/avnzor-deploy/deploy/scripts/deploy.sh /tmp/avnzor-deploy/oms-backend.jar
